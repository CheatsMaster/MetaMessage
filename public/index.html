<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Messenger | Социальная сеть</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                </div>
                <span>Messenger</span>
            </div>
            
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchPage('feed')">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Лента</span>
                </button>
                <button class="nav-tab" onclick="switchPage('chats')">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span>Чаты</span>
                </button>
                <button class="nav-tab" onclick="switchPage('search')">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Поиск</span>
                </button>
                <button class="nav-tab" onclick="switchPage('profile')">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Профиль</span>
                </button>
            </div>
            
            <div class="user-menu">
                <div id="userName" style="color: #A1A1AA; font-size: 14px;"></div>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="feedPage" class="page active">
            <div class="card post-form">
                <textarea id="postContent" class="post-input" rows="3" placeholder="Что у вас нового?"></textarea>
                <div class="post-actions">
                    <button class="btn-primary" onclick="createPost()">Опубликовать</button>
                </div>
            </div>
            <div id="postsFeed"></div>
        </div>

        <div id="chatsPage" class="page">
            <div class="card">
                <h3 style="margin-bottom: 20px;">💬 Мои чаты</h3>
                <div id="chatsList" class="chats-list"></div>
            </div>
            <div id="chatWindow" style="display: none;">
                <div class="card">
                    <h3 id="chatTitle" style="margin-bottom: 20px;">Чат</h3>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="comment-input">
                        <input type="text" id="messageInput" placeholder="Введите сообщение...">
                        <button class="btn-primary" onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="searchPage" class="page">
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск пользователей..." onkeyup="searchUsers()">
            </div>
            <div id="searchResults"></div>
        </div>

        <div id="profilePage" class="page">
            <div class="card">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div class="profile-info">
                        <h2 id="profileUsername">Загрузка...</h2>
                        <div class="email" id="profileEmail"></div>
                        <div class="status" id="profileStatus">🟢 Онлайн</div>
                        <div class="profile-bio" id="profileBio"></div>
                        <button class="btn-secondary edit-btn" onclick="openEditProfile()">✏️ Редактировать профиль</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <input type="text" id="editUsername" placeholder="Имя пользователя">
            <input type="text" id="editFullName" placeholder="Полное имя">
            <textarea id="editBio" rows="3" placeholder="О себе"></textarea>
            <input type="text" id="editWebsite" placeholder="Веб-сайт">
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeEditProfile()">Отмена</button>
                <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentChat = null;

        function switchPage(pageName) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`${pageName}Page`).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.closest('.nav-tab').classList.add('active');
            
            if (pageName === 'feed') loadFeed();
            if (pageName === 'chats') loadChats();
            if (pageName === 'profile') loadProfile();
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        async function loadFeed() {
            try {
                const res = await fetch('/api/posts/feed');
                const posts = await res.json();
                document.getElementById('postsFeed').innerHTML = posts.map(post => renderPost(post)).join('');
            } catch (error) {
                console.error('Ошибка загрузки ленты:', error);
            }
        }

        function renderPost(post) {
            return `
                <div class="post" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar">${(post.profiles?.username?.[0] || 'U').toUpperCase()}</div>
                        <div>
                            <div class="post-author">${post.profiles?.username || 'Пользователь'}</div>
                            <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-stats">
                        <div class="post-stat ${post.liked_by_user ? 'active' : ''}" onclick="toggleLike('${post.id}')">
                            ❤️ ${post.likes_count || 0}
                        </div>
                        <div class="post-stat" onclick="toggleComments('${post.id}')">
                            💬 ${post.comments_count || 0}
                        </div>
                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display: none;">
                        <div id="comments-list-${post.id}"></div>
                        <div class="comment-input">
                            <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                            <button class="btn-secondary" onclick="addComment('${post.id}')">Отправить</button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function createPost() {
            const content = document.getElementById('postContent').value;
            if (!content.trim()) return;
            
            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            
            if (res.ok) {
                document.getElementById('postContent').value = '';
                loadFeed();
            }
        }

        async function toggleLike(postId) {
            await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
            loadFeed();
        }

        async function toggleComments(postId) {
            const commentsDiv = document.getElementById(`comments-${postId}`);
            if (commentsDiv.style.display === 'none') {
                commentsDiv.style.display = 'block';
                await loadComments(postId);
            } else {
                commentsDiv.style.display = 'none';
            }
        }

        async function loadComments(postId) {
            const res = await fetch(`/api/posts/${postId}/comments`);
            const comments = await res.json();
            document.getElementById(`comments-list-${postId}`).innerHTML = comments.map(c => `
                <div class="comment">
                    <div class="comment-avatar">${(c.profiles?.username?.[0] || 'U').toUpperCase()}</div>
                    <div>
                        <div class="comment-author">${c.profiles?.username}</div>
                        <div class="comment-content">${escapeHtml(c.content)}</div>
                    </div>
                </div>
            `).join('');
        }

        async function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value;
            if (!content.trim()) return;
            
            await fetch(`/api/posts/${postId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            
            input.value = '';
            loadComments(postId);
        }

        async function searchUsers() {
            const query = document.getElementById('searchInput').value;
            if (query.length < 2) return;
            
            const res = await fetch(`/api/friends/search?q=${encodeURIComponent(query)}`);
            const users = await res.json();
            
            document.getElementById('searchResults').innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="user-info">
                        <div class="user-avatar">${(user.username?.[0] || 'U').toUpperCase()}</div>
                        <div>
                            <div style="font-weight: 600;">${user.username}</div>
                            <div style="font-size: 12px; color: #A1A1AA;">${user.full_name || ''}</div>
                        </div>
                    </div>
                    <button class="btn-secondary" onclick="startChat('${user.id}')">💬 Написать</button>
                </div>
            `).join('');
        }

        async function loadChats() {
            const res = await fetch('/api/chats');
            const chats = await res.json();
            document.getElementById('chatsList').innerHTML = chats.map(chat => `
                <div class="chat-item" onclick="openChat('${chat.id}')">
                    <div>
                        <div style="font-weight: 600;">${chat.name || 'Личный чат'}</div>
                        <div style="font-size: 12px; color: #A1A1AA;">${chat.last_message?.content || 'Нет сообщений'}</div>
                    </div>
                </div>
            `).join('');
        }

        async function startChat(userId) {
            const res = await fetch(`/api/chats/private/${userId}`, { method: 'POST' });
            const chat = await res.json();
            openChat(chat.id);
            switchPage('chats');
        }

        async function openChat(chatId) {
            currentChat = chatId;
            document.getElementById('chatWindow').style.display = 'block';
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentChat) return;
            const res = await fetch(`/api/chats/${currentChat}/messages`);
            const messages = await res.json();
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender_id === currentUser?.user?.id ? 'sent' : ''}">
                    <div class="message-bubble">
                        <div style="font-size: 12px; margin-bottom: 4px;">${msg.profiles?.username}</div>
                        ${escapeHtml(msg.content)}
                    </div>
                </div>
            `).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value;
            if (!content.trim() || !currentChat) return;
            
            await fetch(`/api/chats/${currentChat}/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            
            input.value = '';
            await loadMessages();
        }

        async function loadProfile() {
            const res = await fetch('/api/auth/me');
            const data = await res.json();
            currentUser = data;
            
            document.getElementById('profileUsername').textContent = data.profile?.username || 'Пользователь';
            document.getElementById('profileEmail').textContent = data.user.email;
            document.getElementById('profileBio').textContent = data.profile?.bio || 'Расскажите о себе';
            document.getElementById('profileAvatar').textContent = (data.profile?.username?.[0] || 'U').toUpperCase();
            document.getElementById('userName').textContent = data.profile?.username || data.user.email.split('@')[0];
        }

        function openEditProfile() {
            document.getElementById('editModal').classList.add('active');
            document.getElementById('editUsername').value = currentUser.profile?.username || '';
            document.getElementById('editFullName').value = currentUser.profile?.full_name || '';
            document.getElementById('editBio').value = currentUser.profile?.bio || '';
            document.getElementById('editWebsite').value = currentUser.profile?.website || '';
        }

        function closeEditProfile() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function saveProfile() {
            const data = {
                username: document.getElementById('editUsername').value,
                full_name: document.getElementById('editFullName').value,
                bio: document.getElementById('editBio').value,
                website: document.getElementById('editWebsite').value
            };
            
            const res = await fetch('/api/users/profile', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                closeEditProfile();
                loadProfile();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            loadFeed();
        });
    </script>
</body>
</html>
