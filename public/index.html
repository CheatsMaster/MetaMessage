<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Messenger | Социальная сеть</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
                    </svg>
                </div>
                <span>Messenger</span>
            </div>
            
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchPage('feed')">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Лента</span>
                </button>
                <button class="nav-tab" onclick="switchPage('chats')">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span>Чаты</span>
                </button>
                <button class="nav-tab" onclick="switchPage('search')">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Поиск</span>
                </button>
                <button class="nav-tab" onclick="switchPage('profile')">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Профиль</span>
                </button>
            </div>
            
            <div class="user-menu">
                <div id="userName" style="color: #A1A1AA; font-size: 14px;"></div>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="feedPage" class="page active">
            <div class="card post-form">
                <textarea id="postContent" class="post-input" rows="3" placeholder="Что у вас нового?"></textarea>
                <div class="post-actions">
                    <button class="btn-primary" onclick="createPost()">Опубликовать</button>
                </div>
            </div>
            <div id="postsFeed"></div>
        </div>

        <div id="chatsPage" class="page">
            <div class="card">
                <h3 style="margin-bottom: 20px;">💬 Мои чаты</h3>
                <div id="chatsList" class="chats-list"></div>
            </div>
            <div id="chatWindow" style="display: none;">
                <div class="card">
                    <h3 id="chatTitle" style="margin-bottom: 20px;">Чат</h3>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="comment-input">
                        <input type="text" id="messageInput" placeholder="Введите сообщение...">
                        <button class="btn-primary" onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="searchPage" class="page">
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск пользователей..." onkeyup="searchUsers()">
            </div>
            <div id="searchResults"></div>
        </div>

        <div id="profilePage" class="page">
            <div class="card">
                <div class="profile-header">
                    <div class="profile-avatar" id="profileAvatar">👤</div>
                    <div class="profile-info">
                        <h2 id="profileUsername">Загрузка...</h2>
                        <div class="email" id="profileEmail"></div>
                        <div class="status" id="profileStatus">🟢 Онлайн</div>
                        <div class="profile-bio" id="profileBio"></div>
                        <button class="btn-secondary edit-btn" onclick="openEditProfile()">✏️ Редактировать профиль</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования профиля -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Редактировать профиль</h3>
            <input type="text" id="editUsername" placeholder="Имя пользователя">
            <input type="text" id="editFullName" placeholder="Полное имя">
            <textarea id="editBio" rows="3" placeholder="О себе"></textarea>
            <input type="text" id="editWebsite" placeholder="Веб-сайт">
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeEditProfile()">Отмена</button>
                <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно просмотра профиля пользователя -->
    <div id="userProfileModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Профиль пользователя</h3>
                <button onclick="closeUserProfile()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <div id="userProfileContent"></div>
            <button class="btn-primary" onclick="startChatFromProfile()" style="width: 100%; margin-top: 20px;">💬 Написать сообщение</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentChat = null;
        let viewedUser = null;

        function switchPage(pageName) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(`${pageName}Page`).classList.add('active');
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.closest('.nav-tab').classList.add('active');
            
            if (pageName === 'feed') loadFeed();
            if (pageName === 'chats') loadChats();
            if (pageName === 'profile') loadProfile();
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }

        // ========== ПОСТЫ ==========
        async function loadFeed() {
            try {
                const res = await fetch('/api/posts/feed');
                if (!res.ok) throw new Error('Ошибка загрузки');
                const posts = await res.json();
                document.getElementById('postsFeed').innerHTML = posts.map(post => renderPost(post)).join('');
            } catch (error) {
                console.error('Ошибка загрузки ленты:', error);
                document.getElementById('postsFeed').innerHTML = '<div class="card">Ошибка загрузки постов</div>';
            }
        }

        function renderPost(post) {
            return `
                <div class="post" data-post-id="${post.id}">
                    <div class="post-header">
                        <div class="post-avatar" onclick="viewUserProfile('${post.user_id}')" style="cursor: pointer;">${(post.profiles?.username?.[0] || 'U').toUpperCase()}</div>
                        <div>
                            <div class="post-author" onclick="viewUserProfile('${post.user_id}')" style="cursor: pointer;">${post.profiles?.username || 'Пользователь'}</div>
                            <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-stats">
                        <div class="post-stat ${post.liked_by_user ? 'active' : ''}" onclick="toggleLike('${post.id}')">
                            ❤️ ${post.likes_count || 0}
                        </div>
                        <div class="post-stat" onclick="toggleComments('${post.id}')">
                            💬 ${post.comments_count || 0}
                        </div>
                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display: none;">
                        <div id="comments-list-${post.id}"></div>
                        <div class="comment-input">
                            <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                            <button class="btn-secondary" onclick="addComment('${post.id}')">Отправить</button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function createPost() {
            const content = document.getElementById('postContent').value;
            if (!content.trim()) return;
            
            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            
            if (res.ok) {
                document.getElementById('postContent').value = '';
                loadFeed();
            } else {
                alert('Ошибка создания поста');
            }
        }

        async function toggleLike(postId) {
            await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
            loadFeed();
        }

        async function toggleComments(postId) {
            const commentsDiv = document.getElementById(`comments-${postId}`);
            if (commentsDiv.style.display === 'none') {
                commentsDiv.style.display = 'block';
                await loadComments(postId);
            } else {
                commentsDiv.style.display = 'none';
            }
        }

        async function loadComments(postId) {
            try {
                const res = await fetch(`/api/posts/${postId}/comments`);
                if (!res.ok) throw new Error('Ошибка загрузки комментариев');
                const comments = await res.json();
                const commentsList = document.getElementById(`comments-list-${postId}`);
                
                if (comments.length === 0) {
                    commentsList.innerHTML = '<div style="color: #A1A1AA; text-align: center; padding: 20px;">Нет комментариев. Будьте первым!</div>';
                } else {
                    commentsList.innerHTML = comments.map(c => `
                        <div class="comment">
                            <div class="comment-avatar" onclick="viewUserProfile('${c.user_id}')" style="cursor: pointer;">${(c.profiles?.username?.[0] || 'U').toUpperCase()}</div>
                            <div>
                                <div class="comment-author" onclick="viewUserProfile('${c.user_id}')" style="cursor: pointer;">${c.profiles?.username || 'Пользователь'}</div>
                                <div class="comment-content">${escapeHtml(c.content)}</div>
                                <div style="font-size: 11px; color: #A1A1AA; margin-top: 4px;">${new Date(c.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Ошибка загрузки комментариев:', error);
                document.getElementById(`comments-list-${postId}`).innerHTML = '<div style="color: red;">Ошибка загрузки комментариев</div>';
            }
        }

        async function addComment(postId) {
            const input = document.getElementById(`comment-input-${postId}`);
            const content = input.value;
            if (!content.trim()) return;
            
            const res = await fetch(`/api/posts/${postId}/comments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            
            if (res.ok) {
                input.value = '';
                await loadComments(postId);
                // Обновляем счетчик комментариев в посте
                loadFeed();
            } else {
                alert('Ошибка отправки комментария');
            }
        }

        // ========== ПОИСК ПОЛЬЗОВАТЕЛЕЙ ==========
        async function searchUsers() {
            const query = document.getElementById('searchInput').value;
            if (query.length < 2) {
                document.getElementById('searchResults').innerHTML = '';
                return;
            }
            
            try {
                const res = await fetch(`/api/friends/search?q=${encodeURIComponent(query)}`);
                if (!res.ok) throw new Error('Ошибка поиска');
                const users = await res.json();
                
                if (users.length === 0) {
                    document.getElementById('searchResults').innerHTML = '<div class="card" style="text-align: center;">Пользователи не найдены</div>';
                } else {
                    document.getElementById('searchResults').innerHTML = users.map(user => `
                        <div class="user-card">
                            <div class="user-info" onclick="viewUserProfile('${user.id}')" style="cursor: pointer; flex: 1;">
                                <div class="user-avatar">${(user.username?.[0] || 'U').toUpperCase()}</div>
                                <div>
                                    <div style="font-weight: 600;">${escapeHtml(user.username)}</div>
                                    <div style="font-size: 12px; color: #A1A1AA;">${escapeHtml(user.full_name || '')}</div>
                                    <div style="font-size: 11px; color: #A1A1AA; margin-top: 4px;">${escapeHtml(user.bio?.substring(0, 50) || '')}</div>
                                </div>
                            </div>
                            <button class="btn-secondary" onclick="startChat('${user.id}')">💬 Написать</button>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Ошибка поиска:', error);
                document.getElementById('searchResults').innerHTML = '<div class="card" style="text-align: center;">Ошибка поиска</div>';
            }
        }

        // ========== ПРОСМОТР ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ ==========
        async function viewUserProfile(userId) {
            try {
                const res = await fetch(`/api/users/${userId}`);
                if (!res.ok) throw new Error('Ошибка загрузки профиля');
                const user = await res.json();
                viewedUser = user;
                
                const content = document.getElementById('userProfileContent');
                content.innerHTML = `
                    <div style="text-align: center;">
                        <div class="profile-avatar" style="width: 100px; height: 100px; margin: 0 auto 20px;">${(user.username?.[0] || 'U').toUpperCase()}</div>
                        <h2>${escapeHtml(user.username || 'Пользователь')}</h2>
                        <div style="color: #A1A1AA; margin: 8px 0;">${escapeHtml(user.full_name || '')}</div>
                        <div style="color: #A1A1AA; margin: 8px 0;">${escapeHtml(user.bio || 'Расскажите о себе')}</div>
                        ${user.website ? `<div style="color: #7C3AED; margin: 8px 0;">🌐 ${escapeHtml(user.website)}</div>` : ''}
                        <div class="status" style="margin-top: 16px;">🟢 ${user.status || 'online'}</div>
                    </div>
                `;
                
                document.getElementById('userProfileModal').classList.add('active');
            } catch (error) {
                console.error('Ошибка загрузки профиля пользователя:', error);
                alert('Не удалось загрузить профиль');
            }
        }

        function closeUserProfile() {
            document.getElementById('userProfileModal').classList.remove('active');
            viewedUser = null;
        }

        async function startChatFromProfile() {
            if (viewedUser) {
                await startChat(viewedUser.id);
                closeUserProfile();
            }
        }

        // ========== ЧАТЫ ==========
        async function loadChats() {
            try {
                const res = await fetch('/api/chats');
                if (!res.ok) throw new Error('Ошибка загрузки чатов');
                const chats = await res.json();
                
                if (chats.length === 0) {
                    document.getElementById('chatsList').innerHTML = '<div style="text-align: center; padding: 40px; color: #A1A1AA;">Нет чатов. Начните диалог через поиск!</div>';
                } else {
                    document.getElementById('chatsList').innerHTML = chats.map(chat => `
                        <div class="chat-item" onclick="openChat('${chat.id}')">
                            <div>
                                <div style="font-weight: 600;">${escapeHtml(chat.name || 'Личный чат')}</div>
                                <div style="font-size: 12px; color: #A1A1AA;">${escapeHtml(chat.last_message?.content || 'Нет сообщений')}</div>
                            </div>
                            <div style="font-size: 12px; color: #A1A1AA;">${chat.last_message ? new Date(chat.last_message.created_at).toLocaleTimeString() : ''}</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Ошибка загрузки чатов:', error);
                document.getElementById('chatsList').innerHTML = '<div class="card" style="text-align: center;">Ошибка загрузки чатов</div>';
            }
        }

        async function startChat(userId) {
            try {
                const res = await fetch(`/api/chats/private/${userId}`, { method: 'POST' });
                if (!res.ok) throw new Error('Ошибка создания чата');
                const chat = await res.json();
                await openChat(chat.id);
                switchPage('chats');
            } catch (error) {
                console.error('Ошибка создания чата:', error);
                alert('Не удалось начать чат');
            }
        }

        async function openChat(chatId) {
            currentChat = chatId;
            document.getElementById('chatWindow').style.display = 'block';
            document.getElementById('chatTitle').textContent = 'Чат #' + chatId.substring(0, 8);
            await loadMessages();
            // Обновляем список чатов
            loadChats();
        }

        async function loadMessages() {
            if (!currentChat) return;
            try {
                const res = await fetch(`/api/chats/${currentChat}/messages`);
                if (!res.ok) throw new Error('Ошибка загрузки сообщений');
                const messages = await res.json();
                const messagesDiv = document.getElementById('chatMessages');
                
                if (messages.length === 0) {
                    messagesDiv.innerHTML = '<div style="text-align: center; padding: 40px; color: #A1A1AA;">Нет сообщений. Напишите что-нибудь!</div>';
                } else {
                    messagesDiv.innerHTML = messages.map(msg => `
                        <div class="message ${msg.sender_id === currentUser?.user?.id ? 'sent' : ''}">
                            <div class="message-bubble">
                                <div style="font-size: 11px; margin-bottom: 4px; color: #C084FC;">${escapeHtml(msg.profiles?.username)}</div>
                                ${escapeHtml(msg.content)}
                                <div style="font-size: 10px; margin-top: 4px; color: #A1A1AA;">${new Date(msg.created_at).toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `).join('');
                }
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
                document.getElementById('chatMessages').innerHTML = '<div style="color: red;">Ошибка загрузки сообщений</div>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value;
            if (!content.trim() || !currentChat) return;
            
            try {
                const res = await fetch(`/api/chats/${currentChat}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });
                
                if (res.ok) {
                    input.value = '';
                    await loadMessages();
                } else {
                    alert('Ошибка отправки сообщения');
                }
            } catch (error) {
                console.error('Ошибка отправки сообщения:', error);
                alert('Ошибка отправки сообщения');
            }
        }

        // ========== ПРОФИЛЬ ТЕКУЩЕГО ПОЛЬЗОВАТЕЛЯ ==========
        async function loadProfile() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) throw new Error('Ошибка загрузки профиля');
                const data = await res.json();
                currentUser = data;
                
                document.getElementById('profileUsername').textContent = data.profile?.username || 'Пользователь';
                document.getElementById('profileEmail').textContent = data.user.email;
                document.getElementById('profileBio').textContent = data.profile?.bio || 'Расскажите о себе';
                document.getElementById('profileAvatar').textContent = (data.profile?.username?.[0] || 'U').toUpperCase();
                document.getElementById('userName').textContent = data.profile?.username || data.user.email.split('@')[0];
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                window.location.href = '/login.html';
            }
        }

        function openEditProfile() {
            document.getElementById('editModal').classList.add('active');
            document.getElementById('editUsername').value = currentUser.profile?.username || '';
            document.getElementById('editFullName').value = currentUser.profile?.full_name || '';
            document.getElementById('editBio').value = currentUser.profile?.bio || '';
            document.getElementById('editWebsite').value = currentUser.profile?.website || '';
        }

        function closeEditProfile() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function saveProfile() {
            const data = {
                username: document.getElementById('editUsername').value,
                full_name: document.getElementById('editFullName').value,
                bio: document.getElementById('editBio').value,
                website: document.getElementById('editWebsite').value
            };
            
            try {
                const res = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    closeEditProfile();
                    await loadProfile();
                    alert('Профиль успешно обновлен!');
                } else {
                    alert('Ошибка сохранения профиля');
                }
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка сохранения профиля');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await loadProfile();
            await loadFeed();
            
            // Загружаем чаты если мы на странице чатов
            if (document.getElementById('chatsPage').classList.contains('active')) {
                await loadChats();
            }
        });
    </script>
</body>
</html>
