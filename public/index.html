<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Messenger | Социальная сеть</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .profile-tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: #A1A1AA;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 60px;
            transition: all 0.3s;
        }
        .profile-tab.active {
            background: #7C3AED;
            color: white;
        }
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            gap: 12px;
        }
        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
        }
        .chat-user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .back-btn {
            background: rgba(124, 58, 237, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            color: #C084FC;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            white-space: nowrap;
        }
        .back-btn:hover {
            background: rgba(124, 58, 237, 0.4);
        }
        .chat-action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: #A1A1AA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        .chat-action-btn:hover {
            background: rgba(124, 58, 237, 0.3);
            color: #C084FC;
        }
        @media (max-width: 768px) {
            .back-btn span { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                </div>
                <span>Messenger</span>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchPage('feed')">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Лента</span>
                </button>
                <button class="nav-tab" onclick="switchPage('chats')">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span>Чаты</span>
                </button>
                <button class="nav-tab" onclick="switchPage('search')">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <span>Поиск</span>
                </button>
                <button class="nav-tab" onclick="switchPage('profile')">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span>Профиль</span>
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="feedPage" class="page active">
            <div class="card post-form">
                <textarea id="postContent" class="post-input" rows="3" placeholder="Что у вас нового?"></textarea>
                <div class="post-actions"><button class="btn-primary" onclick="window.createPost()">Опубликовать</button></div>
            </div>
            <div id="postsFeed"></div>
        </div>

        <div id="chatsPage" class="page">
            <div class="card" id="chatsListCard"><h3 style="margin-bottom: 20px;">💬 Мои чаты</h3><div id="chatsList" class="chats-list"></div></div>
            <div id="chatWindow" style="display: none;">
                <div class="card">
                    <div class="chat-header">
                        <button class="back-btn" onclick="window.closeChat()">← <span>Назад</span></button>
                        <div class="chat-user-info" id="chatUserInfo" onclick="window.viewChatUserProfile()">
                            <div class="chat-user-avatar" id="chatAvatar">👤</div>
                            <div><div style="font-weight: 600;" id="chatUserName">Загрузка...</div><div style="font-size: 11px; color: #A1A1AA;" id="chatUserStatus">онлайн</div></div>
                        </div>
                        <div class="chat-actions"><button class="chat-action-btn" onclick="window.showChatMenu()" title="Меню">⋮</button></div>
                    </div>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="comment-input">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') window.sendMessage()">
                        <button class="btn-primary" onclick="window.sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="searchPage" class="page">
            <div class="search-bar"><input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск пользователей..." onkeyup="window.searchUsers()"></div>
            <div id="searchResults"></div>
        </div>

        <div id="profilePage" class="page"><div id="myProfileContainer"></div></div>
        <div id="settingsPage" class="page"><div id="settingsContainer"></div></div>
    </div>

    <div id="userProfileModal" class="modal">
        <div class="modal-content" style="max-width: 700px; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>Профиль</h3>
                <button onclick="window.closeUserProfile()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <div id="userProfileContent"></div>
        </div>
    </div>

    <div id="likesModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3>❤️ Кто лайкнул</h3>
                <button onclick="window.closeLikesModal()" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
            </div>
            <div id="likesModalContent" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
